<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 등록</title>
</head>
<body>
<h2>상품 정보 입력</h2>

<form th:action="@{/product/send}" method="post">
    <div>
        <label>상품명</label>
        <input type="text" name="productName" placeholder="상품명 입력">
    </div>
    <br>

    <div>
        <label>상품가격</label>
        <input type="number" name="productPrice" placeholder="상품가격 입력">
    </div>
    <br>

    <div>
        <label>상품재고</label>
        <input type="number" name="productStock" placeholder="상품재고 입력">
    </div>
    <br>

    <div>
        <label>브랜드</label>
        <input type="text" name="productBrand" placeholder="브랜드 입력">
    </div>
    <br>

    <button type="submit">전송</button>
</form>
</body>
</html>
