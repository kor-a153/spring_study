<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>마이페이지</title>
</head>
<body>
<div th:object="${session.member}">
<!--    모두.. 라서 ..-->
    <h1 id="memberId" th:text="*{memberId}"></h1>
    <h1 id="memberEmail" th:text="*{memberEmail}"></h1>
    <h1 id="memberPassword" th:text="*{memberPassword}"></h1>
    <h1 id="memberName" th:text="*{memberName}"></h1>
</div>


<button onclick="window.location.href='/members/update'">회원 수정</button>
<button onclick="window.location.href='/members/logout'">로그아웃</button>
<button id="withdraw-btn">회원 탈퇴</button>

</body>
</html>
